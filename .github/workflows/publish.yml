name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*' # Triggers on release tags like v0.1.5
  workflow_dispatch: # Enables manual publication triggering from GitHub Actions

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # CRITICAL: Required for secure OpenID Connect (OIDC) token generation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Publish package
        run: flutter pub publish --force
