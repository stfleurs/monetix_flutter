name: Publish to pub.dev

on:
  push:
    tags:
      - 'v*' # Triggers on all release tags starting with 'v' (e.g. v0.1.7)
  workflow_dispatch: # Enables manual publication triggering from GitHub Actions

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # CRITICAL: Required for secure OpenID Connect (OIDC) token generation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Dart SDK (for OIDC handshake)
        uses: dart-lang/setup-dart@v1

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze package
        run: flutter analyze

      - name: Run unit tests
        run: flutter test

      - name: Verify pub.dev publishing constraints
        run: flutter pub publish --dry-run

      - name: Publish package
        run: flutter pub publish --force
