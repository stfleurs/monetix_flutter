name: monetix_flutter
description: A production-ready monetization policy layer for Flutter. Manages ads, premium state, consent, and rewarded ad-free breaks.
version: 0.1.0
repository: https://github.com/stfleurs/monetix_flutter

environment:
  sdk: '>=3.2.3 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  google_mobile_ads: ^7.0.0
  shared_preferences: ^2.2.0
  provider: ^6.0.5
  connectivity_plus: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
